<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- LOAD CONFIG -->
  <script src="config.js"></script>

  <title>SEB Session</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .banner {
      color: white;
      width: 100%;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .logo {
      margin: 20px 0;
      width: 220px;
    }
    .instruction {
      font-size: 18px;
      color: #d32f2f;
      margin: 20px;
      text-align: center;
    }
    .button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffcd00;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="banner" id="banner"></div>
<img src="logo.png" class="logo">

<div class="instruction" id="instruction"></div>

<!-- PIN SECTION -->
<div id="pin-section">
  <input type="password" id="pin" placeholder="Enter invigilator PIN" style="padding:10px; font-size:16px;">
  <br>
  <button class="button" onclick="checkPIN()">Unlock</button>
</div>

<!-- LOGIN BUTTON -->
<div id="login-section" style="display:none;">
  <button class="button"
    onclick="window.location.href='https://courses.mizzouk12.missouri.edu/login/canvas'">
    Proceed to Canvas Login
  </button>
</div>

<script>
document.getElementById('banner').innerText =
  `${SCHOOL_NAME} – ${SESSION_NAME} (${SESSION_DATE})`;

document.getElementById('banner').style.backgroundColor = BANNER_COLOR;

document.getElementById('instruction').innerText =
  "Wait for invigilator approval before proceeding.";

function checkPIN() {
  const entered = document.getElementById('pin').value;
  if (entered === INVIGILATOR_PIN) {
    document.getElementById('pin-section').style.display = 'none';
    document.getElementById('login-section').style.display = 'block';
  } else {
    alert("Incorrect PIN");
  }
}
</script>

</body>
</html>
