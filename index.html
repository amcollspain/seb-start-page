<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="config.js"></script>
  <title>SEB Session</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .banner {
      color: white;
      width: 100%;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .logo {
      margin: 20px 0;
      width: 220px;
    }
    .instruction {
      font-size: 18px;
      color: #d32f2f;
      margin: 20px;
      text-align: center;
    }
    .button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffcd00;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="banner" id="banner"></div>
<img src="logo.png" class="logo">

<div class="instruction" id="instruction"></div>

<div id="pin-section">
  <input type="password" id="pin" placeholder="Invigilator PIN"
    style="padding:10px; font-size:16px;">
  <br>
  <button class="button" onclick="checkPIN()">Unlock</button>
</div>

<div id="login-section" style="display:none;">
  <button class="button"
    onclick="window.location.href='https://tigerportal.maestrosis.com/'">
    Proceed to Canvas Login
  </button>
</div>

<script>
// ===== DATE =====
function todayStr() {
  return new Date().toISOString().split("T")[0];
}

// ===== FIND SESSION =====
function getSession() {
  const today = todayStr();
  return SESSION_RANGES.find(s => today >= s.start && today <= s.end);
}

// ===== 4-DIGIT PIN =====
function generateDailyPIN() {
  const input = SECRET + todayStr();

  let hash = 0;
  for (let i = 0; i < input.length; i++) {
    hash = (hash << 5) - hash + input.charCodeAt(i);
    hash |= 0;
  }

  const pin = Math.abs(hash % 10000);
  return pin.toString().padStart(4, '0');
}

// ===== UI =====
const today = todayStr();
const session = getSession();

if (!session) {
  document.getElementById('banner').innerText =
    `${SCHOOL_NAME} – No Active Session (${today})`;
  document.getElementById('banner').style.backgroundColor = "#888";
} else {
  document.getElementById('banner').innerText =
    `${SCHOOL_NAME} – ${session.name} (${today})`;
  document.getElementById('banner').style.backgroundColor = session.color;
}

document.getElementById('instruction').innerText =
  "Wait for invigilator approval before proceeding.";

// ===== PIN CHECK =====
function checkPIN() {
  const entered = document.getElementById('pin').value;
  const correct = generateDailyPIN();

  if (entered === correct) {
    document.getElementById('pin-section').style.display = 'none';
    document.getElementById('login-section').style.display = 'block';
  } else {
    alert("Incorrect PIN");
  }
}
</script>

</body>
</html>
